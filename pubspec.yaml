name: oticasos_vitrine_app
description: "Vitrine digital e painel admin da Ótica SOS"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.12.2
  cached_network_image: ^3.4.1
  auto_size_text: ^3.0.0
  just_audio: ^0.10.5
  go_router: ^17.1.0
  flutter_riverpod: ^3.3.1
  intl: ^0.20.2
  url_launcher: ^6.3.2
  google_fonts: ^8.0.2
  http: ^1.6.0
  qr_flutter: ^4.1.0
  marquee: ^2.3.0
  file_picker: ^11.0.2
  image_picker: ^1.2.2
  flutter_dotenv: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/logo.png
    - assets/bg_layer.png
    - .env
